apiVersion: v1
kind: ConfigMap
metadata:
  name: app-settings
  namespace: default
spring:
 profiles:
  active: dev
data:
  # Simple literal key-value pairs
  LOG_LEVEL: "INFO"
  API_ENDPOINT: "https://example.com"
  ENABLE_FEATURE_X: "true"

  # An entire configuration file embedded using block scaling
  app-config.json: |
    {
      "database": {
        "host": "://example.com",
        "port": 5432,
        "poolSize": 20
      },
      "cache": {
        "enabled": true,
        "ttl": 3600
      }
    }
